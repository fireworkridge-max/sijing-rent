<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泗泾优选房源大厅</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        warm: { 50: '#faf9f8', 100: '#f3f2ef', 200: '#e8e5e1', 300: '#d5d0c8', 400: '#b8b1a6', 500: '#9c9284', 600: '#857a6c', 700: '#6f6558', 800: '#5c544b', 900: '#4d463f' },
                        accent: { 50: '#f0fdfa', 100: '#ccfbf1', 200: '#99f6e4', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #faf9f8; color: #4d463f; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased font-sans flex flex-col min-h-screen">

    <!-- 顶部导航 -->
    <nav class="bg-white border-b border-warm-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <span class="text-2xl">🚇</span>
                    <span class="font-bold text-xl text-warm-900 tracking-tight">泗泾优选房源大厅</span>
                </div>
                <div class="flex items-center gap-3">
                    <span id="db-status" class="flex items-center gap-1 text-xs font-medium text-warm-500 bg-warm-100 px-3 py-1.5 rounded-full">
                        <span class="w-2 h-2 rounded-full bg-yellow-400 animate-pulse"></span> 连接中...
                    </span>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主体内容 -->
    <main class="flex-1 w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- 头部介绍 -->
        <div class="mb-8 max-w-3xl">
            <h1 class="text-3xl font-bold text-warm-900 mb-3">实时真实租房库</h1>
            <p class="text-lg text-warm-600">根据距离、户型和预算筛选您的理想好房。获取更多房源数据联系VX：17502100451。朋友圈有房源视频。</p>
        </div>

        <!-- 筛选控制台 -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-warm-200 mb-8 sticky top-20 z-40 bg-opacity-95 backdrop-blur">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
                
                <!-- 关键词搜索 -->
                <div class="lg:col-span-2 relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-warm-400">🔍</span>
                    <input type="text" id="filter-search" placeholder="输入小区名称 (如: 丁香苑、保利)..." class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-warm-300 focus:outline-none focus:ring-2 focus:ring-accent-500 bg-warm-50">
                </div>
                
                <!-- 距离检索 -->
                <div>
                    <select id="filter-distance" class="w-full px-4 py-2.5 rounded-xl border border-warm-300 focus:outline-none focus:ring-2 focus:ring-accent-500 bg-warm-50 text-warm-900 appearance-none">
                        <option value="all">所有距离</option>
                        <option value="<500m">步行核心 (< 500m)</option>
                        <option value="500m-1km">电车通勤 (500m-1km)</option>
                        <option value="1km-2km">公交接驳 (1km-2km)</option>
                        <option value=">2km">远距大居 (> 2km)</option>
                    </select>
                </div>

                <!-- 户型检索 -->
                <div>
                    <select id="filter-type" class="w-full px-4 py-2.5 rounded-xl border border-warm-300 focus:outline-none focus:ring-2 focus:ring-accent-500 bg-warm-50 text-warm-900 appearance-none">
                        <option value="all">所有户型</option>
                        <option value="整租">整租房源</option>
                        <option value="合租主卧">合租主卧 (带独卫)</option>
                        <option value="合租次卧">合租次卧</option>
                        <option value="一室户">独立一室户</option>
                    </select>
                </div>

                <!-- 租金检索 -->
                <div>
                    <select id="filter-price" class="w-full px-4 py-2.5 rounded-xl border border-warm-300 focus:outline-none focus:ring-2 focus:ring-accent-500 bg-warm-50 text-warm-900 appearance-none">
                        <option value="all">所有租金</option>
                        <option value="0-1500">¥1500 以下</option>
                        <option value="1500-2500">¥1500 - ¥2500</option>
                        <option value="2500-4000">¥2500 - ¥4000</option>
                        <option value="4000-99999">¥4000 以上</option>
                    </select>
                </div>

            </div>
            
            <!-- 重置按钮与统计 -->
            <div class="mt-4 pt-4 border-t border-warm-100 flex justify-between items-center">
                <div class="text-sm text-warm-500">
                    共找到 <span id="results-count" class="font-bold text-accent-600">0</span> 套符合条件的房源
                </div>
                <button id="btn-reset" class="text-sm font-medium text-warm-500 hover:text-warm-800 transition-colors">
                    清除所有筛选条件
                </button>
            </div>
        </div>

        <!-- 房源列表 Grid -->
        <div id="listings-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- 骨架屏 (加载中状态) -->
            <div class="bg-white p-5 rounded-2xl border border-warm-200 shadow-sm animate-pulse h-64"></div>
            <div class="bg-white p-5 rounded-2xl border border-warm-200 shadow-sm animate-pulse h-64"></div>
            <div class="bg-white p-5 rounded-2xl border border-warm-200 shadow-sm animate-pulse h-64"></div>
            <div class="bg-white p-5 rounded-2xl border border-warm-200 shadow-sm animate-pulse h-64"></div>
        </div>

        <!-- 无结果空状态 -->
        <div id="empty-state" class="hidden py-16 text-center bg-white rounded-2xl border border-warm-200 border-dashed">
            <div class="text-5xl mb-4 text-warm-300">🕵️</div>
            <h3 class="text-xl font-medium text-warm-900">暂无符合条件的房源</h3>
            <p class="text-warm-500 mt-2">试试减少一些筛选条件，或者换个小区名称搜索。</p>
        </div>

    </main>

    <!-- 联系看房 Modal -->
    <div id="contact-modal" class="fixed inset-0 bg-warm-900/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden text-center transform transition-all">
            <div class="p-8">
                <div class="w-16 h-16 bg-accent-100 text-accent-600 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">
                    👋
                </div>
                <h3 class="text-2xl font-bold text-warm-900 mb-2">联系看房</h3>
                <p class="text-warm-500 mb-6 text-sm">此房源由专属管家维护，扫码或添加微信获取底价和真实看房视频。</p>
                
                <div class="bg-warm-50 border border-warm-200 rounded-xl p-4 mb-6">
                    <p class="text-xs text-warm-500 uppercase tracking-wider font-bold mb-1">专属客服微信</p>
                    <p class="text-xl font-bold text-accent-700 select-all">17502100451</p>
                    <p class="text-xs text-warm-400 mt-2">7*24小时极速响应</p>
                </div>

                <button onclick="closeContactModal()" class="w-full bg-warm-900 text-white font-medium py-3 rounded-xl hover:bg-warm-800 transition-colors">
                    我知道了
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase 实时数据库逻辑 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 初始化配置
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // 全局状态
        let currentUser = null;
        let allListings = []; // 从云端拉取的全量数据

        // 绑定 Modal 全局函数 (因为 module 作用域隔离)
        window.openContactModal = () => document.getElementById('contact-modal').classList.remove('hidden');
        window.closeContactModal = () => document.getElementById('contact-modal').classList.add('hidden');

        // 1. 认证流程
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth failed:", error);
                updateDbStatus("auth-error");
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                fetchRealtimeListings(); // 认证成功后拉取数据
            }
        });

        // 2. 拉取实时数据
        function fetchRealtimeListings() {
            if (!currentUser) return;
            
            // 严格遵守路径规则：artifacts/{appId}/public/data/listings
            const listingsRef = collection(db, 'artifacts', appId, 'public', 'data', 'listings');
            
            onSnapshot(listingsRef, (snapshot) => {
                if (snapshot.empty) {
                    seedInitialData(); // 如果数据库没数据，注入初始演示数据
                } else {
                    allListings = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    updateDbStatus("connected");
                    applyFilters(); // 拉取完立刻应用筛选并渲染
                }
            }, (error) => {
                console.error("Firestore error:", error);
                updateDbStatus("error");
            });
        }

        // 3. 初始数据库播种 (仅在首次运行无数据时触发)
        async function seedInitialData() {
            const seedData = [
                { title: "朝南主卧带阳台 精装全配", community: "保利翡丽公馆", price: 2800, type: "合租主卧", distance: "<500m", tags: ["近地铁", "高端小区"], added: Date.now() },
                { title: "高性价比一室户 随时看房", community: "丁香苑", price: 2100, type: "一室户", distance: "500m-1km", tags: ["朝南", "大空间"], added: Date.now() - 1000 },
                { title: "精装大两房 适合家庭整租", community: "同润山河小城", price: 4500, type: "整租", distance: "1km-2km", tags: ["户型方正", "随时拎包"], added: Date.now() - 2000 },
                { title: "新凯二期朝南次卧 押一付一", community: "兰馨苑", price: 1500, type: "合租次卧", distance: "1km-2km", tags: ["性价比高", "押一付一"], added: Date.now() - 3000 }
            ];

            const listingsRef = collection(db, 'artifacts', appId, 'public', 'data', 'listings');
            for (let i = 0; i < seedData.length; i++) {
                // 使用 doc(collection, id) 手动指定ID确保不重复插入
                await setDoc(doc(listingsRef, `seed_${i}`), seedData[i]);
            }
        }

        // 4. 纯内存前端筛选逻辑
        function applyFilters() {
            const searchVal = document.getElementById('filter-search').value.toLowerCase();
            const distanceVal = document.getElementById('filter-distance').value;
            const typeVal = document.getElementById('filter-type').value;
            const priceVal = document.getElementById('filter-price').value;

            const filtered = allListings.filter(item => {
                // 关键词检索 (匹配标题或小区)
                const matchSearch = item.community.toLowerCase().includes(searchVal) || item.title.toLowerCase().includes(searchVal);
                
                // 距离检索
                const matchDistance = distanceVal === 'all' || item.distance === distanceVal;
                
                // 户型检索
                const matchType = typeVal === 'all' || item.type === typeVal;
                
                // 租金检索
                let matchPrice = true;
                if (priceVal !== 'all') {
                    const [min, max] = priceVal.split('-').map(Number);
                    matchPrice = item.price >= min && item.price <= max;
                }

                return matchSearch && matchDistance && matchType && matchPrice;
            });

            // 按添加时间倒序排列 (最新的在前)
            filtered.sort((a, b) => b.added - a.added);
            
            renderGrid(filtered);
        }

        // 5. 渲染 UI
        function renderGrid(data) {
            const grid = document.getElementById('listings-grid');
            const emptyState = document.getElementById('empty-state');
            document.getElementById('results-count').textContent = data.length;

            grid.innerHTML = '';

            if (data.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            grid.classList.remove('hidden');
            emptyState.classList.add('hidden');

            data.forEach(item => {
                // 距离标签颜色
                let distColor = 'bg-warm-100 text-warm-600';
                if(item.distance === '<500m') distColor = 'bg-red-50 text-red-600 border border-red-100';
                if(item.distance === '500m-1km') distColor = 'bg-orange-50 text-orange-600 border border-orange-100';

                const tagsHtml = (item.tags || []).map(t => `<span class="px-2 py-1 bg-warm-50 text-warm-500 rounded text-xs border border-warm-100">${t}</span>`).join('');

                const cardHtml = `
                    <div class="bg-white rounded-2xl border border-warm-200 shadow-sm hover:shadow-lg hover:-translate-y-1 transition-all duration-300 flex flex-col overflow-hidden h-full">
                        <div class="p-5 flex-1 flex flex-col">
                            <div class="flex justify-between items-start mb-3">
                                <span class="text-xs font-bold px-2 py-1 rounded-md ${distColor}">${item.distance}</span>
                                <span class="text-xs font-bold px-2 py-1 rounded-md bg-accent-50 text-accent-700">${item.type}</span>
                            </div>
                            
                            <h3 class="font-bold text-lg text-warm-900 leading-snug mb-2 line-clamp-2">${item.title}</h3>
                            
                            <div class="flex items-center text-warm-500 text-sm mb-4 font-medium">
                                🏡 ${item.community}
                            </div>
                            
                            <div class="flex flex-wrap gap-1 mb-4 mt-auto">
                                ${tagsHtml}
                            </div>
                            
                            <div class="pt-4 border-t border-warm-100 flex justify-between items-center mt-auto">
                                <div class="text-accent-600 font-bold">
                                    <span class="text-sm">¥</span><span class="text-2xl">${item.price}</span><span class="text-xs text-warm-400 font-normal">/月</span>
                                </div>
                                <button onclick="openContactModal()" class="px-4 py-2 bg-warm-900 hover:bg-warm-800 text-white text-sm font-medium rounded-xl transition-colors">
                                    联系看房
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        // UI 状态提示
        function updateDbStatus(status) {
            const badge = document.getElementById('db-status');
            if (status === 'connected') {
                badge.innerHTML = `<span class="w-2 h-2 rounded-full bg-green-500"></span> 实时同步中`;
                badge.className = "flex items-center gap-1 text-xs font-bold text-green-700 bg-green-50 border border-green-200 px-3 py-1.5 rounded-full shadow-sm";
            } else if (status === 'error' || status === 'auth-error') {
                badge.innerHTML = `<span class="w-2 h-2 rounded-full bg-red-500"></span> 连接失败`;
                badge.className = "flex items-center gap-1 text-xs font-bold text-red-700 bg-red-50 border border-red-200 px-3 py-1.5 rounded-full";
            }
        }

        // 绑定筛选事件
        const filterIds = ['filter-search', 'filter-distance', 'filter-type', 'filter-price'];
        filterIds.forEach(id => {
            document.getElementById(id).addEventListener(id === 'filter-search' ? 'input' : 'change', applyFilters);
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            document.getElementById('filter-search').value = '';
            document.getElementById('filter-distance').value = 'all';
            document.getElementById('filter-type').value = 'all';
            document.getElementById('filter-price').value = 'all';
            applyFilters();
        });

        // 启动应用
        initAuth();

    </script>
</body>
</html>
